services:
  node-agent:
    image: python:3.12-slim
    working_dir: /app/node
    volumes:
      - ./:/app/node
      - ${PROTOCOL_DIR:-../greencompute/protocol}:/app/protocol
      - /var/run/docker.sock:/var/run/docker.sock
      - ${BITTENSOR_WALLET_DIR:-~/.bittensor}:/root/.bittensor:ro
      - node-volumes:/tmp/greencompute-node-volumes
      - node-artifacts:/tmp/greencompute-node-artifacts
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      GREENCOMPUTE_ENABLE_BACKGROUND_WORKERS: "true"
      GREENCOMPUTE_WORKER_POLL_INTERVAL_SECONDS: "${WORKER_POLL_INTERVAL_SECONDS:-1.0}"
      GREENCOMPUTE_BOOTSTRAP_MINER: "true"
      GREENCOMPUTE_CONTROL_PLANE_URL: "${GREENCOMPUTE_CONTROL_PLANE_URL}"
      GREENCOMPUTE_MINER_HOTKEY: "${GREENCOMPUTE_MINER_HOTKEY}"
      GREENCOMPUTE_MINER_PAYOUT_ADDRESS: "${GREENCOMPUTE_MINER_PAYOUT_ADDRESS:-}"
      GREENCOMPUTE_MINER_AUTH_SECRET: "${GREENCOMPUTE_MINER_AUTH_SECRET:-greencompute-node-local-secret}"
      GREENCOMPUTE_MINER_API_BASE_URL: "${GREENCOMPUTE_MINER_API_BASE_URL:-http://127.0.0.1:8007}"
      GREENCOMPUTE_MINER_VALIDATOR_URL: "${GREENCOMPUTE_MINER_VALIDATOR_URL}"
      GREENCOMPUTE_MINER_NODE_ID: "${GREENCOMPUTE_MINER_NODE_ID:-node-01}"
      # Hardware
      GREENCOMPUTE_GPU_MODEL: "${GREENCOMPUTE_GPU_MODEL:-rtx4090}"
      GREENCOMPUTE_GPU_COUNT: "${GREENCOMPUTE_GPU_COUNT:-1}"
      GREENCOMPUTE_VRAM_GB_PER_GPU: "${GREENCOMPUTE_VRAM_GB_PER_GPU:-24}"
      GREENCOMPUTE_CPU_CORES: "${GREENCOMPUTE_CPU_CORES:-32}"
      GREENCOMPUTE_MEMORY_GB: "${GREENCOMPUTE_MEMORY_GB:-128}"
      GREENCOMPUTE_PERFORMANCE_SCORE: "${GREENCOMPUTE_PERFORMANCE_SCORE:-1.0}"
      GREENCOMPUTE_GPU_SPLIT_UNITS: "${GREENCOMPUTE_GPU_SPLIT_UNITS:-100}"
      # Auth
      GREENCOMPUTE_AUTH_MODE: "${GREENCOMPUTE_AUTH_MODE:-hmac}"
      GREENCOMPUTE_COLDKEY_NAME: "${GREENCOMPUTE_COLDKEY_NAME:-}"
      GREENCOMPUTE_HOTKEY_NAME: "${GREENCOMPUTE_HOTKEY_NAME:-default}"
      # Backends
      GREENCOMPUTE_POD_BACKEND: "${GREENCOMPUTE_POD_BACKEND:-process}"
      GREENCOMPUTE_VM_BACKEND: "${GREENCOMPUTE_VM_BACKEND:-stub}"
      GREENCOMPUTE_INFERENCE_BACKEND: "${GREENCOMPUTE_INFERENCE_BACKEND:-docker}"
      # HuggingFace (for vLLM model downloads)
      HF_TOKEN: "${HF_TOKEN:-}"
      HF_HOME: /root/.cache/huggingface
      # Security
      GREENCOMPUTE_SECURITY_TIER: "${GREENCOMPUTE_SECURITY_TIER:-standard}"
      GREENCOMPUTE_ATTESTATION_ENABLED: "${GREENCOMPUTE_ATTESTATION_ENABLED:-false}"
      # Workload kinds
      GREENCOMPUTE_SUPPORTED_WORKLOAD_KINDS: "${GREENCOMPUTE_SUPPORTED_WORKLOAD_KINDS:-inference,pod,vm}"
      # SSH
      GREENCOMPUTE_SSH_HOST: "${GREENCOMPUTE_SSH_HOST:-0.0.0.0}"
      GREENCOMPUTE_SSH_PORT_RANGE_START: "${GREENCOMPUTE_SSH_PORT_RANGE_START:-30000}"
      GREENCOMPUTE_SSH_PORT_RANGE_END: "${GREENCOMPUTE_SSH_PORT_RANGE_END:-31000}"
      # Persistence
      GREENCOMPUTE_HOST_REPO_DIR: ${PWD}
      GREENCOMPUTE_RUNTIME_STATE_PATH: /tmp/greencompute-node-runtime-state.json
      GREENCOMPUTE_VOLUME_BASE_DIR: /tmp/greencompute-node-volumes
      GREENCOMPUTE_ARTIFACT_CACHE_DIR: /tmp/greencompute-node-artifacts
      # PYTHONPATH
      PYTHONPATH: /app/protocol/src:/app/node/services/node-agent/src
    command: >
      sh -lc "apt-get update -qq && apt-get install -y -qq docker.io openssh-client >/dev/null 2>&1;
      pip install -q fastapi uvicorn pydantic substrate-interface &&
      uvicorn greencompute_node_agent.main:app --host 0.0.0.0 --port 8007"
    # User-pod SSH (30000-31000) and custom-port (31001-32000) ranges are NOT
    # published here — user pods are sibling containers created via the host's
    # Docker socket (see `/var/run/docker.sock` mount above), so their port
    # bindings live directly on the host network stack. Publishing the ranges
    # here would make docker-proxy claim every port in the range and break
    # `docker run -p` for every subsequent rental.
    ports:
      - "8007:8007"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8007/readyz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  node-volumes:
  node-artifacts:
